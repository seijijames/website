---
layout: default
---

<article class="post-preview">

  <header class="post-header">
     <h3>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </h3>
      <p>{{ post.date | date: "%B %-d, %Y" }}</p>
    <p>
      <a href="{{ post.url | relative_url }}">read more →</a>
    </p>
      <p>{{ post.summary }}</p>
  </header>

</article>
